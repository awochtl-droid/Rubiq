<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubiq Cube</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a1628;
    }

    .hero-cube-scene {
      perspective: 800px;
      width: 200px; height: 200px;
      filter: drop-shadow(0 30px 60px rgba(196,154,74,0.18)) drop-shadow(0 8px 20px rgba(26,94,168,0.25));
    }
    .hero-cube {
      width: 200px; height: 200px;
      position: relative;
      transform-style: preserve-3d;
    }
    .hero-cube-face {
      position: absolute;
      width: 200px; height: 200px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px; padding: 5px;
      border-radius: 5px;
    }
    .hero-cube-face.front  { transform: translateZ(100px); }
    .hero-cube-face.back   { transform: rotateY(180deg) translateZ(100px); }
    .hero-cube-face.right  { transform: rotateY(90deg)  translateZ(100px); }
    .hero-cube-face.left   { transform: rotateY(-90deg) translateZ(100px); }
    .hero-cube-face.top    { transform: rotateX(90deg)  translateZ(100px); }
    .hero-cube-face.bottom { transform: rotateX(-90deg) translateZ(100px); }
    .hc {
      border-radius: 4px;
      background-image: linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.18) 100%);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,0.28),
        inset 0 -2px 2px rgba(0,0,0,0.28),
        inset 2px 0 2px rgba(255,255,255,0.12),
        inset -2px 0 2px rgba(0,0,0,0.18);
    }

    @media (max-width: 768px) {
      .hero-cube-scene { width: 150px; height: 150px; }
      .hero-cube { width: 150px; height: 150px; }
      .hero-cube-face { width: 150px; height: 150px; }
      .hero-cube-face.front  { transform: translateZ(75px); }
      .hero-cube-face.back   { transform: rotateY(180deg) translateZ(75px); }
      .hero-cube-face.right  { transform: rotateY(90deg)  translateZ(75px); }
      .hero-cube-face.left   { transform: rotateY(-90deg) translateZ(75px); }
      .hero-cube-face.top    { transform: rotateX(90deg)  translateZ(75px); }
      .hero-cube-face.bottom { transform: rotateX(-90deg) translateZ(75px); }
    }

    @keyframes hero-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-22px); }
    }
    .cube-float { animation: hero-float 3.5s ease-in-out infinite; }
  </style>
</head>
<body>

  <div class="cube-float">
  <div class="hero-cube-scene">
    <div class="hero-cube" id="hero-cube-el">

      <!-- FRONT: mostly blue, two gold cells -->
      <div class="hero-cube-face front">
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
      </div>

      <!-- BACK: dark blue, one light cell -->
      <div class="hero-cube-face back">
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#133F73;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#133F73;"></div>
      </div>

      <!-- RIGHT: mostly gold, one blue cell -->
      <div class="hero-cube-face right">
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#D4AE6A;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
      </div>

      <!-- LEFT: slate, two gold cells -->
      <div class="hero-cube-face left">
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#C49A5A;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#9E7A32;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
        <div class="hc" style="background:#2C3E55;"></div>
      </div>

      <!-- TOP: light blue, one gold -->
      <div class="hero-cube-face top">
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#D4AE6A;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#2A74C8;"></div>
        <div class="hc" style="background:#1A5EA8;"></div>
      </div>

      <!-- BOTTOM: ink dark -->
      <div class="hero-cube-face bottom">
        <div class="hc" style="background:#1C2D44;"></div>
        <div class="hc" style="background:#0F1724;"></div>
        <div class="hc" style="background:#1C2D44;"></div>
        <div class="hc" style="background:#0F1724;"></div>
        <div class="hc" style="background:#1C2D44;"></div>
        <div class="hc" style="background:#0F1724;"></div>
        <div class="hc" style="background:#1C2D44;"></div>
        <div class="hc" style="background:#0F1724;"></div>
        <div class="hc" style="background:#1C2D44;"></div>
      </div>

    </div>
  </div>
  </div>

  <script>
  // Random tumble animation
  (function() {
    const cube = document.getElementById('hero-cube-el');
    if (!cube) return;
    let rx = -18, ry = 20, rz = 3;
    let vx = 0.04, vy = 0.18, vz = 0.01;

    function tick() {
      if (Math.random() < 0.03) vx += (Math.random() - 0.5) * 0.18;
      if (Math.random() < 0.03) vy += (Math.random() - 0.5) * 0.22;
      if (Math.random() < 0.02) vz += (Math.random() - 0.5) * 0.10;

      vx *= 0.994;
      vy *= 0.994;
      vz *= 0.994;

      const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
      vx = clamp(vx, -0.35, 0.35);
      vy = clamp(vy, -0.55, 0.55);
      vz = clamp(vz, -0.18, 0.18);

      if (Math.abs(vy) < 0.06) vy += (Math.random() - 0.5) * 0.12;

      rx += vx; ry += vy; rz += vz;
      cube.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
      requestAnimationFrame(tick);
    }
    tick();
  })();
  </script>

</body>
</html>
